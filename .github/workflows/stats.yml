name: Update visit stats

on:
  schedule:
    - cron: "17 4 * * *"   # daily, ~04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/stats-chart.mjs
        env:
          GOATCOUNTER_API_TOKEN: ${{ secrets.GOATCOUNTER_API_TOKEN }}
      - name: Commit chart if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/visits.svg
          git diff --quiet --staged || git commit -m "chore: update visit chart [skip ci]"
          git push
